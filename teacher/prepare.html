<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>课前准备 - Merry英语</title>
    <link rel="stylesheet" href="teacher.css?v=50">
    <style>
        /* Collapsible objectives */
        .obj-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .obj-toggle .card-title {
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .obj-arrow {
            font-size: 12px;
            color: #aaa;
            transition: transform 0.3s ease;
            padding: 6px 10px;
            background: #f0f0f0;
            border-radius: 6px;
            line-height: 1;
        }
        .obj-arrow.open {
            transform: rotate(180deg);
        }
        .obj-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .obj-body.open {
            max-height: 800px;
        }
        .obj-hint {
            font-size: 12px;
            color: #bbb;
            margin-top: 6px;
        }
        .obj-body.open + .obj-hint {
            display: none;
        }

        /* Time pills */
        .time-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .time-pill {
            flex: 1;
            min-width: 0;
            padding: 12px 6px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            background: white;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 600;
            color: #888;
            -webkit-tap-highlight-color: transparent;
        }
        .time-pill .time-val {
            display: block;
            font-size: 20px;
            font-weight: 700;
            color: #555;
            margin-bottom: 2px;
        }
        .time-pill .time-label {
            display: block;
            font-size: 11px;
            color: #aaa;
            font-weight: normal;
        }
        .time-pill.active {
            border-color: var(--teacher-primary);
            background: #f0fff0;
            color: var(--teacher-primary);
        }
        .time-pill.active .time-val {
            color: var(--teacher-primary);
        }
        .time-pill.active .time-label {
            color: var(--teacher-primary);
        }
        .time-pill:active {
            transform: scale(0.96);
        }

        /* Launch area */
        .launch-area {
            margin-top: 8px;
        }
    </style>
</head>
<body data-page="prepare">
    <div class="top-nav">
        <a href="index.html" class="back-btn">← 返回</a>
        <h1>📚 课前准备</h1>
    </div>
    
    <div class="teacher-view">
        <!-- 1. 选择课程 -->
        <div class="teacher-card">
            <h3 class="card-title">📚 选择课程</h3>
            <div class="grid-2">
                <select class="select-input" id="unit-select">
                    <option value="1">Unit 1 动物</option>
                    <option value="2">Unit 2 数字</option>
                    <option value="3">Unit 3 颜色</option>
                    <option value="4">Unit 4 身体</option>
                </select>
                <select class="select-input" id="lesson-select">
                    <option value="1">Lesson 1</option>
                    <option value="2">Lesson 2</option>
                    <option value="3">Lesson 3</option>
                    <option value="4">Lesson 4</option>
                </select>
            </div>
        </div>

        <!-- 2. 选择模块 -->
        <div class="teacher-card">
            <h3 class="card-title">🎯 选择模块</h3>
            <div class="grid-4" id="module-selector">
                <div class="module-select active" data-mod="listening">听力<br>✓</div>
                <div class="module-select" data-mod="reading">阅读<br>&nbsp;</div>
                <div class="module-select" data-mod="writing">写作<br>&nbsp;</div>
                <div class="module-select" data-mod="speaking">口语<br>&nbsp;</div>
            </div>
        </div>

        <!-- 3. 教学目标（可折叠，默认收起，位于模块和阶段之间） -->
        <div class="teacher-card">
            <div class="obj-toggle" onclick="toggleObjectives()">
                <h3 class="card-title">📖 教学目标</h3>
                <span class="obj-arrow" id="obj-arrow">▼</span>
            </div>
            <div class="obj-body" id="obj-body">
                <div id="objectives-container" style="margin-top: 8px;">
                    <!-- Rendered by JS -->
                </div>
            </div>
            <div class="obj-hint" id="obj-hint">点击展开查看本课教学目标</div>
        </div>

        <!-- 4. 选择阶段 -->
        <div class="teacher-card">
            <h3 class="card-title">📊 选择阶段</h3>
            <div class="grid-2" id="phase-selector">
                <div class="phase-select" data-phase="pretest" style="display:none;">🏃 热身赛<br><small>已取消</small></div>
                <div class="phase-select active" data-phase="practice">🎮 闯关赛<br><small>游戏化练习</small></div>
            </div>
        </div>

        <!-- 5. 答题时间（可视化按钮选择） -->
        <div class="teacher-card">
            <h3 class="card-title">⏱️ 每题答题时间</h3>
            <div class="time-pills" id="time-pills">
                <div class="time-pill active" data-time="0">
                    <span class="time-val">∞</span>
                    <span class="time-label">不限时</span>
                </div>
                <div class="time-pill" data-time="15">
                    <span class="time-val">15</span>
                    <span class="time-label">秒/题</span>
                </div>
                <div class="time-pill" data-time="20">
                    <span class="time-val">20</span>
                    <span class="time-label">秒/题</span>
                </div>
                <div class="time-pill" data-time="30">
                    <span class="time-val">30</span>
                    <span class="time-label">秒/题</span>
                </div>
                <div class="time-pill" data-time="45">
                    <span class="time-val">45</span>
                    <span class="time-label">合作题</span>
                </div>
            </div>
        </div>

        <!-- 6. 发布按钮 -->
        <div class="launch-area">
            <button class="teacher-btn btn-primary" id="btn-start-class" style="margin-top: 0;">
                🚀 开始上课 (发布任务)
            </button>
            <!-- 重置按钮：始终显示，方便测试切换不同课程 -->
            <button class="teacher-btn" id="btn-reset-class" style="margin-top: 10px; background: transparent; color: #bbb; font-size: 13px; padding: 8px 16px; border: 1.5px dashed #ddd; border-radius: 8px; cursor: pointer; width: 100%;">
                🔄 重置课堂 (换课程重新发布)
            </button>
        </div>
    </div>

    <!-- Hidden select for JS compatibility -->
    <select id="time-limit-select" style="display:none;">
        <option value="0" selected>0</option>
    </select>

    <script src="../firebase-sync.js?v=50"></script>
    <script src="data.js?v=50"></script>
    <script src="teacher.js?v=51"></script>
    <script>
        // Toggle objectives
        function toggleObjectives() {
            var body = document.getElementById('obj-body');
            var arrow = document.getElementById('obj-arrow');
            var hint = document.getElementById('obj-hint');
            body.classList.toggle('open');
            arrow.classList.toggle('open');
            hint.style.display = body.classList.contains('open') ? 'none' : 'block';
        }

        // Time pill selection
        var timePills = document.querySelectorAll('.time-pill');
        var hiddenSelect = document.getElementById('time-limit-select');
        timePills.forEach(function(pill) {
            pill.addEventListener('click', function() {
                timePills.forEach(function(p) { p.classList.remove('active'); });
                pill.classList.add('active');
                // Update hidden select for JS compatibility
                hiddenSelect.value = pill.dataset.time;
            });
        });
    </script>
</body>
</html>
