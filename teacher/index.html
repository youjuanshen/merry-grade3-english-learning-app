<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merry英语 - 教师端</title>
    <link rel="stylesheet" href="teacher.css?v=50">
    <style>
        /* Collapsible objectives */
        .obj-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .obj-toggle .card-title {
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        .obj-arrow {
            font-size: 12px;
            color: #aaa;
            transition: transform 0.3s ease;
            padding: 6px 10px;
            background: #f0f0f0;
            border-radius: 6px;
            line-height: 1;
        }
        .obj-arrow.open {
            transform: rotate(180deg);
        }
        .obj-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }
        .obj-body.open {
            max-height: 800px;
        }
        .obj-hint {
            font-size: 12px;
            color: #bbb;
            margin-top: 6px;
        }
        .obj-body.open + .obj-hint {
            display: none;
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <h1>🎓 Merry英语 · 教师端</h1>
    </div>

    <div class="teacher-view">

        <!-- ===== 设置模式 ===== -->
        <div id="setup-area">
            <!-- 选择课程 -->
            <div class="teacher-card">
                <h3 class="card-title">📚 选择课程</h3>
                <div class="grid-2">
                    <select class="select-input" id="unit-select">
                        <option value="1">Unit 1 动物</option>
                        <option value="2">Unit 2 数字</option>
                        <option value="3">Unit 3 颜色</option>
                        <option value="4">Unit 4 身体</option>
                    </select>
                    <select class="select-input" id="lesson-select">
                        <option value="1">Lesson 1</option>
                        <option value="2">Lesson 2</option>
                        <option value="3">Lesson 3</option>
                        <option value="4">Lesson 4</option>
                    </select>
                </div>
            </div>

            <!-- 选择模块 -->
            <div class="teacher-card">
                <h3 class="card-title">🎯 选择模块</h3>
                <div class="grid-4" id="module-selector">
                    <div class="module-select active" data-mod="listening">听力<br>✓</div>
                    <div class="module-select" data-mod="reading">阅读<br>&nbsp;</div>
                    <div class="module-select" data-mod="writing">写作<br>&nbsp;</div>
                    <div class="module-select" data-mod="speaking">口语<br>&nbsp;</div>
                </div>
            </div>

            <!-- 答题时间（一行式） -->
            <div class="teacher-card" style="display:flex; align-items:center; justify-content:space-between; padding:14px 18px;">
                <span style="font-size:15px; font-weight:600; color:#333;">⏱ 每题答题时间</span>
                <select class="select-input" id="time-limit-select" style="width:auto; min-width:120px; margin:0;">
                    <option value="0" selected>不限时</option>
                    <option value="15">15 秒/题</option>
                    <option value="20">20 秒/题</option>
                    <option value="30">30 秒/题</option>
                    <option value="45">45 秒/合作题</option>
                </select>
            </div>

            <!-- 教学目标（可折叠，默认收起） -->
            <div class="teacher-card">
                <div class="obj-toggle" onclick="toggleObjectives()">
                    <h3 class="card-title">📖 教学目标</h3>
                    <span class="obj-arrow" id="obj-arrow">▼</span>
                </div>
                <div class="obj-body" id="obj-body">
                    <div id="objectives-container" style="margin-top:8px;">
                        <!-- Rendered by JS -->
                    </div>
                </div>
                <div class="obj-hint" id="obj-hint">点击展开查看本课教学目标</div>
            </div>

            <!-- 发布按钮 -->
            <div style="margin-top:8px;">
                <button class="teacher-btn btn-primary" id="btn-start-class">🚀 开始上课 (发布任务)</button>
            </div>
        </div>

        <!-- ===== 控制模式 ===== -->
        <div id="control-area" style="display:none;">
            <!-- 顶部信息 -->
            <div style="text-align:center; margin-bottom:16px;">
                <h2 id="control-title" style="font-size:20px; font-weight:800; color:#2c3e50; margin:0 0 4px;">U1L1 · 听力</h2>
                <div id="elapsed-time" style="font-size:13px; color:#888;">已进行 0 分钟</div>
                <div id="stats-bar" style="font-size:14px; color:#666; margin-top:4px;">等待学生加入...</div>
            </div>

            <!-- 需要帮助 -->
            <div class="teacher-card" style="border-left:3px solid #e67e22;">
                <h3 class="card-title" style="color:#e67e22; margin-bottom:8px;">⚠️ 需要帮助 (<span id="help-count">0</span>组)</h3>
                <div id="help-list"><div style="color:#bbb;">暂无</div></div>
            </div>

            <!-- 已完成 -->
            <div class="teacher-card" style="border-left:3px solid #27ae60;">
                <h3 class="card-title" style="color:#27ae60; margin-bottom:8px;">✅ 已完成 (<span id="done-count">0</span>组)</h3>
                <div id="done-list"><div style="color:#bbb;">暂无</div></div>
            </div>

            <!-- 正常进行中 -->
            <div style="text-align:center; padding:12px 0; font-size:14px; color:#888;" id="normal-text">
                其他 0 组正常进行中 ✓
            </div>

            <!-- 底部按钮 -->
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="teacher-btn" onclick="toggleRanking()" style="flex:1; background:#f8f9fa; color:#555; border:1.5px solid #e0e0e0; font-size:13px; padding:10px;">🏆 排行榜</button>
                <button class="teacher-btn" onclick="toggleWrongWords()" style="flex:1; background:#f8f9fa; color:#555; border:1.5px solid #e0e0e0; font-size:13px; padding:10px;">📖 易错词</button>
                <button class="teacher-btn" onclick="resetClass()" style="flex:1; background:#f8f9fa; color:#999; border:1.5px solid #e0e0e0; font-size:13px; padding:10px;">🔄 重置</button>
            </div>

            <!-- 排行榜面板（默认隐藏） -->
            <div id="ranking-panel" class="teacher-card" style="display:none; margin-top:12px;"></div>

            <!-- 易错词面板（默认隐藏） -->
            <div id="wrongwords-panel" class="teacher-card" style="display:none; margin-top:12px;"></div>
        </div>

    </div>

    <script src="../firebase-sync.js?v=52"></script>
    <script src="data.js?v=50"></script>
    <script src="teacher.js?v=52"></script>
    <script>
        function toggleObjectives() {
            var body = document.getElementById('obj-body');
            var arrow = document.getElementById('obj-arrow');
            var hint = document.getElementById('obj-hint');
            body.classList.toggle('open');
            arrow.classList.toggle('open');
            hint.style.display = body.classList.contains('open') ? 'none' : 'block';
        }
    </script>
</body>
</html>
